<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="950" viewBox="0 0 1400 950">
<defs>
  <marker id="a" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
    <path d="M1,1 L8,4.5 L1,8 Z" fill="#58a6ff"/>
  </marker>
  <style>
  .bg{fill:#0e1116}
  .panel{fill:#161b22;stroke:#30363d;stroke-width:1}
  .ink{fill:#e6edf3}
  .muted{fill:#8b949e}
  .accent{fill:#ff7b3d}
  .glow{fill:#ff3b30}
  .line{stroke:#e6edf3;stroke-width:2;fill:none}
  .thin{stroke:#8b949e;stroke-width:1;fill:none}
  .dim{stroke:#58a6ff;stroke-width:1;fill:none}
  .dimtxt{fill:#58a6ff;font:600 13px 'Segoe UI',sans-serif}
  .body{fill:#21262d;stroke:#484f58;stroke-width:1.5}
  .ghost{fill:none;stroke:#3fb950;stroke-width:1.5;stroke-dasharray:5 4}
  text{font-family:'Segoe UI',Arial,sans-serif}
  .title{font:700 26px 'Segoe UI';fill:#e6edf3}
  .sub{font:400 14px 'Segoe UI';fill:#8b949e}
  .lbl{font:600 13px 'Segoe UI';fill:#e6edf3}
  .note{font:400 12px 'Segoe UI';fill:#8b949e}
</style>
</defs>
<rect class="bg" width="1400" height="950"/>
<text class="title" x="40" y="50">T008 · Driver / Cockpit Envelope — SIDE (95th-pct male, semi-reclined)</text>
<text class="sub" x="40" y="74">Warm Wheelers · all dims mm · helmet + bottle costume + steering reach + ≤10 s egress · v0 2026-06-22</text>

<!-- ground -->
<line class="line" x1="60" y1="860" x2="1340" y2="860"/>
<text class="note" x="62" y="884">GROUND / floor pan</text>

<!-- clearance envelope (ghost box) -->
<rect class="ghost" x="352.4" y="364.40000000000003" width="462" height="495.59999999999997" rx="10"/>
<text class="note" x="352.4" y="354.40000000000003" fill="#3fb950">CLEARANCE ENVELOPE — nothing rigid inside this box</text>

<!-- bottle costume volume over driver -->
<rect class="ghost" x="331.4" y="389.6" width="151.2" height="378" rx="50.4" stroke="#ff7b3d" opacity="0.8"/>
<text class="note" x="331.4" y="407.6" fill="#ff7b3d" text-anchor="middle" transform="rotate(-90 331.4 407.6)">orange BOTTLE costume volume</text>

<!-- seat -->
<path class="body" d="M 407 767.6 h 189 v 16.8 h -189 z"/>
<path class="body" d="M 407 767.6 l -16.8 -260.4 l 50.4 0 l 16.8 235.2 z"/>
<text class="note" x="407" y="801.6">seat pan · H-point ↓ low for CoG</text>

<!-- driver: hip->torso->head, and hip->knee->foot (recumbent) -->
<g stroke="#e6edf3" stroke-width="3" fill="none">
  <line x1="470" y1="767.6" x2="419.6" y2="532.4000000000001"/>
  <line x1="470" y1="767.6" x2="646.4" y2="750.8000000000001"/>
  <line x1="646.4" y1="750.8000000000001" x2="705.2" y2="843.2"/>
  <line x1="432.2" y1="570.2" x2="579.2" y2="629"/>
</g>
<!-- head + helmet -->
<circle class="body" cx="407" cy="482.00000000000006" r="54.6"/>
<text class="note" x="407" y="487.00000000000006" text-anchor="middle" fill="#e6edf3">HELMET</text>

<!-- steering reach: short arc + grip -->
<path class="ghost" d="M 533 692 A 260.4 260.4 0 0 1 621.2 587" opacity="0.7" stroke="#ff7b3d"/>
<circle class="accent" cx="579.2" cy="629" r="9"/>
<text class="note" x="589.7" y="633" fill="#ff7b3d">steering grip (reach arc)</text>

<!-- pedals -->
<rect class="accent" x="696.8" y="830.6" width="25.2" height="29.4"/>
<text class="note" x="696.8" y="884" fill="#ff7b3d">pedals/brake</text>

<!-- egress arrow -->
<path d="M 407 421.40000000000003 q 63 -96.6 197.4 -50.4" class="line" marker-end="url(#a)" stroke="#3fb950"/>
<text class="note" x="499.4" y="330.80000000000007" fill="#3fb950">EGRESS ≤ 10 s (S4) — up &amp; out, no tools</text>

<!-- dimensions -->

  <line class="dim" x1="323" y1="427.40000000000003" x2="323" y2="860" marker-start="url(#a)" marker-end="url(#a)"/>
  <line class="thin" x1="317" y1="427.40000000000003" x2="329" y2="427.40000000000003"/>
  <line class="thin" x1="317" y1="860" x2="329" y2="860"/>
  <text class="dimtxt" x="315" y="643.7" text-anchor="end" transform="rotate(-90 315 643.7)">≈1060 head+helmet clearance</text>

  <line class="dim" x1="738.8" y1="767.6" x2="738.8" y2="860" marker-start="url(#a)" marker-end="url(#a)"/>
  <line class="thin" x1="732.8" y1="767.6" x2="744.8" y2="767.6"/>
  <line class="thin" x1="732.8" y1="860" x2="744.8" y2="860"/>
  <text class="dimtxt" x="730.8" y="813.8" text-anchor="end" transform="rotate(-90 730.8 813.8)">≈220 H-point ht</text>

  <line class="dim" x1="726.2" y1="750.8000000000001" x2="726.2" y2="860" marker-start="url(#a)" marker-end="url(#a)"/>
  <line class="thin" x1="720.2" y1="750.8000000000001" x2="732.2" y2="750.8000000000001"/>
  <line class="thin" x1="720.2" y1="860" x2="732.2" y2="860"/>
  <text class="dimtxt" x="718.2" y="805.4000000000001" text-anchor="end" transform="rotate(-90 718.2 805.4000000000001)">≈560 knee ht</text>

  <line class="dim" x1="352.4" y1="923" x2="705.2" y2="923" marker-start="url(#a)" marker-end="url(#a)"/>
  <line class="thin" x1="352.4" y1="917" x2="352.4" y2="929"/>
  <line class="thin" x1="705.2" y1="917" x2="705.2" y2="929"/>
  <text class="dimtxt" x="528.8" y="916" text-anchor="middle">≈1250 occupant length (recumbent)</text>

<!-- side panel of anthropometrics -->
<g transform="translate(990,150)">
  <rect class="panel" x="0" y="0" width="360" height="300" rx="12"/>
  <text class="lbl" x="18" y="32">95th-pct male seated (mm)</text>
  <text class="note" x="18" y="62">Sitting height (seat→crown): 965</text>
  <text class="note" x="18" y="86">+ helmet allowance: 60–100 → reserve 1060</text>
  <text class="note" x="18" y="110">Buttock–knee length: 620</text>
  <text class="note" x="18" y="134">Knee height seated: 560</text>
  <text class="note" x="18" y="158">Shoulder breadth: 510  (min cockpit W)</text>
  <text class="note" x="18" y="182">Hip breadth: 420</text>
  <text class="note" x="18" y="214" fill="#3fb950">Checks fed to matrix:</text>
  <text class="note" x="18" y="236">S4 egress ≤10 s · S6 view ≥100° · C5 CoG low</text>
  <text class="note" x="18" y="270" fill="#8b949e">Status: scaffold v0 — verify on real driver + costume.</text>
</g>
</svg>