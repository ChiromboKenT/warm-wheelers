<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1180" viewBox="0 0 1400 1180">
<defs>
  <marker id="a" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
    <path d="M1,1 L8,4.5 L1,8 Z" fill="#58a6ff"/>
  </marker>
  <style>
  .bg{fill:#0e1116}
  .panel{fill:#161b22;stroke:#30363d;stroke-width:1}
  .ink{fill:#e6edf3}
  .muted{fill:#8b949e}
  .accent{fill:#ff7b3d}
  .glow{fill:#ff3b30}
  .line{stroke:#e6edf3;stroke-width:2;fill:none}
  .thin{stroke:#8b949e;stroke-width:1;fill:none}
  .dim{stroke:#58a6ff;stroke-width:1;fill:none}
  .dimtxt{fill:#58a6ff;font:600 13px 'Segoe UI',sans-serif}
  .body{fill:#21262d;stroke:#484f58;stroke-width:1.5}
  .ghost{fill:none;stroke:#3fb950;stroke-width:1.5;stroke-dasharray:5 4}
  text{font-family:'Segoe UI',Arial,sans-serif}
  .title{font:700 26px 'Segoe UI';fill:#e6edf3}
  .sub{font:400 14px 'Segoe UI';fill:#8b949e}
  .lbl{font:600 13px 'Segoe UI';fill:#e6edf3}
  .note{font:400 12px 'Segoe UI';fill:#8b949e}
</style>
</defs>
<rect class="bg" width="1400" height="1180"/>
<text class="title" x="40" y="48">T009 · Concept Layout v0 — SIDE + TOP  [DECISION]</text>
<text class="sub" x="40" y="72">Warm Wheelers · all dims mm · within RB max 2000 W × 2500 H × 6000 L · v0 2026-06-22</text>

<!-- ===== SIDE VIEW ===== -->
<text class="lbl" x="120" y="122.59999999999997">SIDE</text>
<line class="line" x1="90" y1="560" x2="768" y2="560"/>
<text class="note" x="94" y="582">ground</text>

<!-- wheels: wheelbase 1800, front near x=300, rear x=2100 -->
<circle class="body" cx="201" cy="530.3" r="29.700000000000003"/>
<circle class="body" cx="687" cy="530.3" r="29.700000000000003"/>

<!-- heater shell silhouette (tall box) raked back slightly -->
<path class="body" d="M 187.5 516.8
  L 187.5 155
  L 700.5 155
  L 714 516.8 Z"/>
<!-- grille zone front -->
<rect class="panel" x="187.5" y="209" width="32.400000000000006" height="243.00000000000003"/>
<rect class="glow" x="189.66000000000003" y="214.39999999999998" width="28.080000000000002" height="24.3" opacity="0.3"/><rect class="glow" x="189.66000000000003" y="254.89999999999998" width="28.080000000000002" height="24.3" opacity="0.36"/><rect class="glow" x="189.66000000000003" y="295.4" width="28.080000000000002" height="24.3" opacity="0.42"/><rect class="glow" x="189.66000000000003" y="335.9" width="28.080000000000002" height="24.3" opacity="0.48"/><rect class="glow" x="189.66000000000003" y="376.4" width="28.080000000000002" height="24.3" opacity="0.54"/><rect class="glow" x="189.66000000000003" y="416.9" width="28.080000000000002" height="24.3" opacity="0.6"/>

<!-- driver+seat low -->
<circle class="ghost" cx="430.5" cy="317" r="40.5" stroke="#3fb950"/>
<line class="ghost" x1="430.5" y1="354.79999999999995" x2="471" y2="492.5" stroke="#3fb950"/>
<text class="note" x="363" y="392.6" fill="#3fb950">driver + bottle (mass low, at floor)</text>
<!-- ballast -->
<rect class="accent" x="363" y="497.9" width="135" height="18.900000000000002"/>
<text class="note" x="364.35" y="493.85" fill="#ff7b3d">ballast low</text>

<!-- side dims -->

  <line class="dim" x1="201" y1="630.2" x2="687" y2="630.2" marker-start="url(#a)" marker-end="url(#a)"/>
  <line class="thin" x1="201" y1="624.2" x2="201" y2="636.2"/>
  <line class="thin" x1="687" y1="624.2" x2="687" y2="636.2"/>
  <text class="dimtxt" x="444" y="623.2" text-anchor="middle">1800 wheelbase</text>

  <line class="dim" x1="103.8" y1="155" x2="103.8" y2="560" marker-start="url(#a)" marker-end="url(#a)"/>
  <line class="thin" x1="97.8" y1="155" x2="109.8" y2="155"/>
  <line class="thin" x1="97.8" y1="560" x2="109.8" y2="560"/>
  <text class="dimtxt" x="95.8" y="357.5" text-anchor="end" transform="rotate(-90 95.8 357.5)">1500 shell ht (≤2500 max)</text>

  <line class="dim" x1="746.4000000000001" y1="500.6" x2="746.4000000000001" y2="560" marker-start="url(#a)" marker-end="url(#a)"/>
  <line class="thin" x1="740.4000000000001" y1="500.6" x2="752.4000000000001" y2="500.6"/>
  <line class="thin" x1="740.4000000000001" y1="560" x2="752.4000000000001" y2="560"/>
  <text class="dimtxt" x="738.4000000000001" y="530.3" text-anchor="end" transform="rotate(-90 738.4000000000001 530.3)">≈220 ground clr</text>

  <line class="dim" x1="171.3" y1="678.8" x2="714" y2="678.8" marker-start="url(#a)" marker-end="url(#a)"/>
  <line class="thin" x1="171.3" y1="672.8" x2="171.3" y2="684.8"/>
  <line class="thin" x1="714" y1="672.8" x2="714" y2="684.8"/>
  <text class="dimtxt" x="442.65" y="671.8" text-anchor="middle">≈2350 overall length (≤6000 max)</text>

<!-- ===== TOP VIEW ===== -->
<text class="lbl" x="120" y="657">TOP (plan)</text>
<!-- body outline -->
<rect class="body" x="171.3" y="819" width="540" height="162" rx="21.6"/>
<!-- wheels: track 1300, wheelbase 1800 -->
<rect class="panel" x="186.15" y="694.8" width="29.700000000000003" height="59.400000000000006"/><rect class="panel" x="186.15" y="1045.8" width="29.700000000000003" height="59.400000000000006"/><rect class="panel" x="672.15" y="694.8" width="29.700000000000003" height="59.400000000000006"/><rect class="panel" x="672.15" y="1045.8" width="29.700000000000003" height="59.400000000000006"/>
<!-- centreline -->
<line class="thin" x1="160.5" y1="900" x2="727.5" y2="900" stroke-dasharray="6 5"/>
<!-- seat/driver -->
<circle class="ghost" cx="430.5" cy="900" r="70.2" stroke="#3fb950"/>
<text class="note" x="390" y="837" fill="#3fb950">seat centred, low</text>
<!-- steering at front axle -->
<line class="accent" x1="201" y1="724.5" x2="201" y2="1075.5" stroke="#ff7b3d" stroke-width="3"/>
<text class="note" x="209.10000000000002" y="748.8" fill="#ff7b3d">steered front axle</text>

<!-- top dims -->

  <line class="dim" x1="103.8" y1="724.5" x2="103.8" y2="1075.5" marker-start="url(#a)" marker-end="url(#a)"/>
  <line class="thin" x1="97.8" y1="724.5" x2="109.8" y2="724.5"/>
  <line class="thin" x1="97.8" y1="1075.5" x2="109.8" y2="1075.5"/>
  <text class="dimtxt" x="95.8" y="900" text-anchor="end" transform="rotate(-90 95.8 900)">1300 track</text>

  <line class="dim" x1="201" y1="1121.4" x2="687" y2="1121.4" marker-start="url(#a)" marker-end="url(#a)"/>
  <line class="thin" x1="201" y1="1115.4" x2="201" y2="1127.4"/>
  <line class="thin" x1="687" y1="1115.4" x2="687" y2="1127.4"/>
  <text class="dimtxt" x="444" y="1114.4" text-anchor="middle">1800 wheelbase</text>

  <line class="dim" x1="171.3" y1="781.2" x2="711.3000000000001" y2="781.2" marker-start="url(#a)" marker-end="url(#a)"/>
  <line class="thin" x1="171.3" y1="775.2" x2="171.3" y2="787.2"/>
  <line class="thin" x1="711.3000000000001" y1="775.2" x2="711.3000000000001" y2="787.2"/>
  <text class="dimtxt" x="441.30000000000007" y="774.2" text-anchor="middle">2000 body width (≤2000 max)</text>

<!-- decision panel -->
<g transform="translate(950,520)">
  <rect class="panel" x="0" y="0" width="400" height="430" rx="12"/>
  <text class="lbl" x="18" y="34">DECISION — geometry v0</text>
  <text class="note" x="18" y="64">Wheelbase: 1800 mm</text>
  <text class="note" x="18" y="88">Track width: 1300 mm</text>
  <text class="note" x="18" y="112">Ground clearance: ~220 mm</text>
  <text class="note" x="18" y="136">Shell height: 1500 mm (rake ~3°)</text>
  <text class="note" x="18" y="160">Overall L×W×H: 2350×2000×1500</text>
  <text class="note" x="18" y="196" fill="#3fb950">Why:</text>
  <text class="note" x="18" y="218">• CoG target ≤0.45×track → ≤585 mm (C1)</text>
  <text class="note" x="18" y="240">• Turning radius aim ≤6 m (ST1)</text>
  <text class="note" x="18" y="262">• Compact, well inside RB 2×2.5×6 m</text>
  <text class="note" x="18" y="284">• Mass low: driver+bottle+ballast at floor</text>
  <text class="note" x="18" y="320" fill="#ff7b3d">Open / to verify:</text>
  <text class="note" x="18" y="342">• Real wheel Ø vs ground clr</text>
  <text class="note" x="18" y="364">• Track vs measured CoG (tilt-table)</text>
  <text class="note" x="18" y="386">• RB official weight limit [RB?]</text>
  <text class="note" x="18" y="416" fill="#8b949e">Log this in the decision log.</text>
</g>
</svg>